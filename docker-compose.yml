services:
  postgres-db:
    build: ./infrastructure
    container_name: postgres-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: research_db
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d research_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  orchestrator-api:
    build: ./apps/orchestrator-api
    container_name: orchestrator-api
    env_file: ./apps/orchestrator-api/.env
    depends_on:
      postgres-db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=src
      - DATABASE_URL=postgresql://admin:password@postgres-db:5432/research_db
      - DUCKDB_DATA_DIR=/shared/workspaces
      - FINANCIAL_MCP_URL=http://mcp-financial:8000/sse
      - MACRO_MCP_URL=http://mcp-macro:8000/sse
      - TRENDS_MCP_URL=http://mcp-trends:8000/sse
      - ANALYTICS_MCP_URL=http://mcp-analytics:8000/sse
    volumes:
      - ./apps/orchestrator-api/workspaces:/shared/workspaces

  mcp-analytics:
    build: ./packages/mcp-analytics
    container_name: mcp-analytics
    ports:
      - "8021:8000"
    environment:
      - DUCKDB_DATA_DIR=/shared/workspaces
    volumes:
      - ./apps/orchestrator-api/workspaces:/shared/workspaces

  mcp-financial:
    build: ./packages/mcp-financial
    container_name: mcp-financial
    env_file: ./apps/orchestrator-api/.env
    ports:
      - "8023:8000"
    environment:
      - MCP_TRANSPORT=sse
      - MCP_PORT=8000

  mcp-macro:
    build: ./packages/mcp-macro
    container_name: mcp-macro
    env_file: ./apps/orchestrator-api/.env
    ports:
      - "8022:8000"
    environment:
      - MCP_TRANSPORT=sse
      - MCP_PORT=8000

  mcp-trends:
    build: ./packages/mcp-trends
    container_name: mcp-trends
    env_file: ./apps/orchestrator-api/.env
    ports:
      - "8024:8000"
    environment:
      - MCP_TRANSPORT=sse
      - MCP_PORT=8000

  frontend-ui:
    build: ./apps/frontend-ui
    container_name: frontend-ui
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://orchestrator-api:8000

volumes:
  pg-data:
  workspaces-data:
